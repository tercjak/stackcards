<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Editor - Stacklands</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #1a1a2e; font-family: 'Nunito', sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    .editor-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      width: 320px;
      background: rgba(30, 30, 50, 0.98);
      border-right: 2px solid #c8a86b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 15px;
      background: rgba(200, 168, 107, 0.2);
      border-bottom: 2px solid #c8a86b;
    }

    .sidebar-title {
      color: #f0d080;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .palette-tabs {
      display: flex;
      border-bottom: 2px solid #c8a86b;
    }

    .palette-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #a08050;
      transition: all 0.2s;
    }

    .palette-tab.active {
      background: rgba(200, 168, 107, 0.2);
      color: #f0d080;
    }

    .palette-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      margin-bottom: 6px;
      background: rgba(50, 50, 70, 0.5);
      border: 1px solid rgba(200, 168, 107, 0.3);
      border-radius: 6px;
      cursor: grab;
      transition: all 0.2s;
    }

    .palette-item:hover {
      background: rgba(70, 70, 90, 0.7);
      border-color: #c8a86b;
    }

    .palette-item-icon {
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .palette-item-info {
      flex: 1;
      min-width: 0;
    }

    .palette-item-name {
      color: #e0d0a0;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .palette-item-type {
      color: #807050;
      font-size: 9px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .canvas-toolbar {
      padding: 10px 15px;
      background: rgba(30, 30, 50, 0.98);
      border-bottom: 2px solid #c8a86b;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .canvas-title {
      color: #f0d080;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .canvas-coords {
      color: #888;
      font-size: 11px;
      font-family: monospace;
    }

    .canvas-save-btn {
      margin-left: auto;
      background: #2d8a3e;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .canvas-save-btn:hover {
      background: #3da84e;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      background:
        radial-gradient(ellipse at 15% 25%, #2d4a3a40 0%, transparent 40%),
        radial-gradient(ellipse at 78% 68%, #1d3a2a60 0%, transparent 50%),
        radial-gradient(ellipse at 50% 5%, #2a5a3a40 0%, transparent 35%),
        #1a2a20;
      overflow: hidden;
    }

    .placed-item {
      position: absolute;
      background: rgba(200, 168, 107, 0.9);
      border: 2px solid #f0d080;
      border-radius: 6px;
      padding: 4px 8px;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      white-space: nowrap;
    }

    .placed-item:hover {
      background: rgba(240, 208, 128, 0.95);
      z-index: 100;
    }

    .placed-item.selected {
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .item-card {
      width: 60px;
      height: 80px;
    }

    .item-asset {
      min-width: 100px;
    }

    .properties-panel {
      width: 280px;
      background: rgba(30, 30, 50, 0.98);
      border-left: 2px solid #c8a86b;
      padding: 15px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .properties-title {
      color: #f0d080;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .property-row {
      margin-bottom: 12px;
    }

    .property-label {
      color: #a09070;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .property-input {
      width: 100%;
      background: rgba(50, 50, 70, 0.5);
      border: 1px solid rgba(200, 168, 107, 0.3);
      border-radius: 4px;
      color: #e0d0a0;
      padding: 6px 8px;
      font-size: 11px;
      font-family: inherit;
    }

    .property-input:focus {
      outline: none;
      border-color: #c8a86b;
    }

    .delete-btn {
      width: 100%;
      background: #8a2d3e;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #aa3d4e;
    }

    .no-selection {
      color: #606060;
      font-size: 11px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="root">
    <h2 style="color: white; padding: 20px; font-family: 'Nunito', sans-serif;">
      Loading Map Editor...
    </h2>
  </div>

  <script type="text/babel" src="map_editor.jsx"></script>
</body>
</html>
